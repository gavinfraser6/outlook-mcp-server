<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Outlook Assistant</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a2129; --panel2:#222b35; --line:#2d3743;
    --text:#e6edf3; --muted:#8b98a5; --accent:#3b82f6; --accent2:#2563eb;
    --green:#2ea043; --red:#da3633; --amber:#d29922; --chip:#2d3743;
    --radius:10px;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--text)}
  a{color:var(--accent)}
  header{position:sticky;top:0;z-index:20;display:flex;gap:12px;align-items:center;
    padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px}
  .grow{flex:1}
  .pill{background:var(--chip);border:1px solid var(--line);border-radius:999px;
    padding:3px 10px;font-size:12px;color:var(--muted)}
  .pill b{color:var(--text)}
  input,select,textarea,button{font:inherit;color:var(--text)}
  input[type=text],input[type=email],select,textarea{
    background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px}
  textarea{width:100%;resize:vertical;min-height:140px}
  button{cursor:pointer;background:var(--panel2);border:1px solid var(--line);
    border-radius:8px;padding:7px 12px}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent2);border-color:var(--accent2)}
  button.primary:hover{background:var(--accent)}
  button.danger:hover{border-color:var(--red);color:#ff6b67}
  button.ghost{background:transparent}
  .tabs{display:flex;gap:6px}
  .tab{padding:6px 12px;border-radius:8px;color:var(--muted);border:1px solid transparent}
  .tab.active{color:var(--text);background:var(--panel2);border-color:var(--line)}
  main{max-width:920px;margin:0 auto;padding:16px}
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .insightBar{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:8px;margin:0 0 12px}
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 10px;min-height:58px}
  .metric b{display:block;font-size:18px;line-height:1.1;color:var(--text)}
  .metric span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
  .convMeta{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin:4px 0 8px}
  .insight{color:#c8d2dc;font-size:13px;margin:6px 0 8px}
  .suggest{border-left:3px solid var(--accent);padding:7px 9px;background:rgba(59,130,246,.10);border-radius:6px;margin:8px 0;color:#dbeafe}
  .follow{border-color:#3f4a56;color:#cbd5e1}
  .follow.reply_owed{border-color:var(--red);color:#ffb3af;background:#351d20}
  .follow.waiting_on_them{border-color:var(--amber);color:#ffe2a3;background:#332916}
  .follow.last_from_you{border-color:#6b7280;color:#d1d5db;background:#242932}
  .question{color:#d8dee9;background:#1f2933;border:1px solid var(--line);border-radius:8px;padding:7px 9px;margin:7px 0;font-size:12px}
  .threadline{display:grid;grid-template-columns:90px 1fr auto;gap:8px;align-items:start;border-top:1px solid var(--line);padding:7px 0;font-size:12px;color:var(--muted)}
  .threadline b{color:var(--text);font-weight:600}
  @media (max-width:760px){.insightBar{grid-template-columns:repeat(2,minmax(0,1fr))}.threadline{grid-template-columns:1fr}.card .row1{align-items:flex-start}.card .date{white-space:normal}}
  .search{flex:1;min-width:200px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;margin-bottom:10px;transition:border-color .1s}
  .card.sel{border-color:var(--accent)}
  .card .row1{display:flex;gap:8px;align-items:baseline}
  .card .subj{font-weight:600;flex:1;cursor:pointer}
  .card .subj:hover{text-decoration:underline}
  .card .date{color:var(--muted);font-size:12px;white-space:nowrap}
  .card .from{color:var(--muted);font-size:13px;margin:2px 0}
  .card .snip{color:#b9c3cd;font-size:13px;margin:4px 0 8px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .score{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;background:#16324f;color:#8ec5ff}
  .score.hi{background:#3a1d1d;color:#ff9b97}
  .score.mid{background:#3a3018;color:#ffd479}
  .chips{display:flex;gap:5px;flex-wrap:wrap;margin:2px 0 8px}
  .chip{font-size:11px;color:var(--muted);background:var(--chip);border:1px solid var(--line);
    border-radius:999px;padding:1px 8px}
  .chip.unread{color:#8ec5ff;border-color:#26405c}
  .chip.att::before{content:"📎 "}
  .actions{display:flex;gap:6px;flex-wrap:wrap}
  .actions button{padding:5px 10px;font-size:13px}
  .muted{color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:48px 0}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
    align-items:flex-start;justify-content:center;z-index:50;padding:32px 16px;overflow:auto}
  .overlay.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    width:100%;max-width:760px;padding:18px 20px}
  .modal h2{margin:0 0 4px;font-size:18px}
  .modal .meta{color:var(--muted);font-size:13px;margin-bottom:12px}
  .msg{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:8px 0;background:var(--panel2)}
  .msg .h{display:flex;gap:8px;font-size:12px;color:var(--muted);margin-bottom:6px}
  .msg .body{white-space:pre-wrap;font-size:13px;max-height:280px;overflow:auto}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  .field input{width:100%}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
  .modal-actions .grow{flex:1}
  /* toast */
  #toasts{position:fixed;bottom:18px;right:18px;z-index:80;display:flex;flex-direction:column;gap:8px}
  .toast{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:8px;padding:10px 14px;max-width:340px;animation:slide .2s ease}
  .toast.ok{border-left-color:var(--green)}
  .toast.err{border-left-color:var(--red)}
  @keyframes slide{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}
  .kbd{font-size:11px;color:var(--muted)}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--line);
    border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <h1>📧 Outlook Assistant</h1>
  <div class="tabs">
    <div class="tab active" data-view="triage" onclick="switchView('triage')">Conversations</div>
    <div class="tab" data-view="search" onclick="switchView('search')">Search</div>
    <div class="tab" data-view="drafts" onclick="switchView('drafts')">Drafts</div>
  </div>
  <div class="grow"></div>
  <span class="pill" id="unreadPill">unread <b id="unreadCount">–</b></span>
  <button class="ghost" onclick="newEmail()">✏️ New</button>
  <button class="ghost" onclick="refresh()" title="Refresh (g)">↻</button>
</header>

<main>
  <div class="toolbar" id="triageBar">
    <input class="search" type="text" id="searchBox" placeholder="Search conversations" />
    <select id="daysSel" onchange="refresh()">
      <option value="14">14 days</option>
      <option value="30">30 days</option>
      <option value="60">60 days</option>
      <option value="90">90 days</option>
      <option value="180" selected>180 days</option>
    </select>
    <select id="followDays" onchange="refresh()">
      <option value="1">Follow-up 1d</option>
      <option value="3" selected>Follow-up 3d</option>
      <option value="7">Follow-up 7d</option>
    </select>
    <label class="muted"><input type="checkbox" id="unreadOnly" onchange="refresh()"/> Unread only</label>
  </div>
  <div id="insightBar" class="insightBar"></div>
  <div id="list"></div>
  <div id="status" class="muted" style="text-align:center;padding:12px"></div>
</main>

<!-- Reader modal -->
<div class="overlay" id="readerOverlay" onclick="if(event.target===this)closeModal('readerOverlay')">
  <div class="modal" id="readerModal"></div>
</div>

<!-- Compose modal -->
<div class="overlay" id="composeOverlay" onclick="if(event.target===this)closeModal('composeOverlay')">
  <div class="modal">
    <h2 id="composeTitle">Compose</h2>
    <div class="meta" id="composeMeta"></div>
    <div class="field" id="toField"><label>To</label><input type="text" id="cTo" placeholder="name@example.com"/></div>
    <div class="field" id="ccField"><label>Cc (optional)</label><input type="text" id="cCc"/></div>
    <div class="field" id="subjField"><label>Subject</label><input type="text" id="cSubj"/></div>
    <div class="field"><label id="bodyLabel">Message</label><textarea id="cBody"></textarea></div>
    <div class="modal-actions">
      <span class="grow kbd">Drafts are saved to Outlook. Sending asks for confirmation.</span>
      <button onclick="closeModal('composeOverlay')">Cancel</button>
      <button onclick="saveDraft()">💾 Save draft</button>
      <button class="primary" onclick="sendCompose()">➤ Send…</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
const TOKEN = new URLSearchParams(location.search).get("token") || "";
let VIEW = "triage";
let ITEMS = [];           // current cards
let SEL = 0;              // selected index
let COMPOSE = null;       // {mode:'new'|'reply'|'forward', entry_id, reply_all}

function headers(json){
  const h = {};
  if(json) h["Content-Type"] = "application/json";
  if(TOKEN) h["X-Outlook-Token"] = TOKEN;
  return h;
}
async function api(path, opts){
  const r = await fetch(path, opts || {});
  const data = await r.json();
  return data;
}
async function get(path){ return api(path, {headers:headers(false)}); }
async function post(path, body){
  return api(path, {method:"POST", headers:headers(true), body:JSON.stringify(body||{})});
}

function toast(msg, kind){
  const t = document.createElement("div");
  t.className = "toast " + (kind||"");
  t.textContent = msg;
  document.getElementById("toasts").appendChild(t);
  setTimeout(()=>t.remove(), 4200);
}
function esc(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function setStatus(html){ document.getElementById("status").innerHTML = html || ""; }
function loading(){ setStatus('<span class="spinner"></span> loading…'); }

function switchView(v){
  VIEW = v;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.view===v));
  document.getElementById("triageBar").style.display = (v==="drafts") ? "none" : "flex";
  document.getElementById("insightBar").style.display = (v==="drafts") ? "none" : "grid";
  refresh();
}

async function refresh(){
  loading();
  if(VIEW==="triage") return loadTriage();
  if(VIEW==="search") return loadSearch();
  if(VIEW==="drafts") return loadDrafts();
}

async function loadUnread(){
  const d = await get("/api/unread_count");
  document.getElementById("unreadCount").textContent = d.success ? d.unread_count : "?";
}

function currentDays(){ return document.getElementById("daysSel").value; }
function currentFollowDays(){ return document.getElementById("followDays").value; }

function insightQuery(extra){
  const p = new URLSearchParams({
    days: currentDays(),
    limit: "60",
    unread_only: document.getElementById("unreadOnly").checked,
    follow_up_days: currentFollowDays()
  });
  Object.entries(extra||{}).forEach(([k,v])=>{
    if(v!==undefined && v!==null && `${v}`.trim()!=="") p.set(k, v);
  });
  return `/api/insights?${p.toString()}`;
}

function setInsightSummary(s){
  const bar = document.getElementById("insightBar");
  if(!s){ bar.innerHTML = ""; return; }
  const theme = (s.top_themes||[]).slice(0,2).map(x=>`${esc(x.theme)} (${x.count})`).join(", ") || "none";
  bar.innerHTML = `
    <div class="metric"><b>${s.total_conversations||0}</b><span>conversations</span></div>
    <div class="metric"><b>${s.reply_owed||0}</b><span>reply owed</span></div>
    <div class="metric"><b>${s.waiting_on_them||0}</b><span>waiting on them</span></div>
    <div class="metric"><b>${s.unread_conversations||0}</b><span>unread threads</span></div>
    <div class="metric"><b>${esc(theme)}</b><span>top themes</span></div>`;
}

function insightStatus(d){
  const total = d.page_info ? d.page_info.total_matched : (d.count||0);
  const shown = ITEMS.length;
  const cap = d.capped ? " scan capped" : "";
  return `${shown} of ${total} conversation(s) shown; scanned ${d.scanned||0} message(s) over ${d.days} days.${cap}`;
}

async function loadTriage(){
  const d = await get(insightQuery());
  if(!d.success){ setInsightSummary(null); setStatus("Warning: "+esc(d.message||"error")); ITEMS=[]; renderList(); return; }
  ITEMS = d.conversations || [];
  setInsightSummary(d.mailbox_insights);
  renderList();
  setStatus(ITEMS.length ? insightStatus(d) : "No conversations matched this view.");
}

async function loadSearch(){
  const q = document.getElementById("searchBox").value.trim();
  if(!q){ ITEMS=[]; setInsightSummary(null); renderList(); setStatus("Type a search to find matching conversations."); return; }
  const d = await get(insightQuery({keyword:q}));
  if(!d.success){ setInsightSummary(null); setStatus("Warning: "+esc(d.message||"error")); return; }
  ITEMS = d.conversations || [];
  setInsightSummary(d.mailbox_insights);
  renderList();
  setStatus(insightStatus(d));
}

async function loadDrafts(){
  setInsightSummary(null);
  const d = await get("/api/drafts");
  if(!d.success){ setStatus("⚠️ "+esc(d.message||"error")); return; }
  const list = document.getElementById("list");
  if(!d.drafts.length){ list.innerHTML = '<div class="empty">No drafts.</div>'; setStatus(""); return; }
  list.innerHTML = d.drafts.map(dr=>`
    <div class="card">
      <div class="row1"><div class="subj">${esc(dr.subject||"(no subject)")}</div></div>
      <div class="from">To: ${esc((dr.to||[]).join(", ")||"—")}</div>
      <div class="snip">${esc(dr.body_preview||"")}</div>
      <div class="actions">
        <button class="primary" onclick="sendExistingDraft('${dr.draft_id}')">➤ Send…</button>
      </div>
    </div>`).join("");
  setStatus(`${d.drafts.length} draft(s)`);
}

function scoreClass(s){ return s>=14?"hi":(s>=7?"mid":""); }
function chip(text, cls){ return text ? `<span class="chip ${cls||""}">${esc(text)}</span>` : ""; }
function followChip(f){
  if(!f || !f.state || f.state==="none") return "";
  const due = f.due ? " due" : "";
  return `<span class="chip follow ${esc(f.state)}">${esc(f.label||f.state)}${due}</span>`;
}
function conversationDate(e){ return e.latest_date || e.date || ""; }
function conversationFrom(e){ return e.latest_from || e.from || ""; }
function conversationSnippet(e){ return e.insight_summary || e.latest_snippet || e.snippet || ""; }
function conversationScore(e){ return e.attention_score!=null ? e.attention_score : e.triage_score; }

function renderList(){
  const list = document.getElementById("list");
  if(!ITEMS.length){ list.innerHTML = '<div class="empty">Nothing here.</div>'; return; }
  list.innerHTML = ITEMS.map((e,i)=>{
    const score = conversationScore(e);
    const scoreBadge = (score!=null) ? `<span class="score ${scoreClass(score)}">${score}</span>` : "";
    const reasons = (e.triage_reasons||[]).slice(0,4).map(r=>chip(r)).join("");
    const themes = (e.themes||[]).slice(0,5).map(t=>chip(t)).join("");
    const unreadChip = (e.unread_count>0) ? chip(`${e.unread_count} unread`, "unread") : (e.unread ? chip("unread", "unread") : "");
    const attCount = e.attachment_count || (e.has_attachments ? e.attachment_count : 0);
    const attChip = attCount ? `<span class="chip att">${attCount}</span>` : "";
    const labels = (e.labels||[]).map(l=>chip(l)).join("");
    const question = (e.open_questions||[])[0];
    const questionHtml = question ? `<div class="question"><b>${esc(question.from||"Question")}</b>: ${esc(question.question||"")}</div>` : "";
    const meta = e.message_count ? `${e.message_count} messages; ${e.inbound_count||0} in / ${e.outbound_count||0} out` : "single message";
    const follow = e.follow_up || {};
    return `<div class="card conversation ${i===SEL?'sel':''}" data-i="${i}" id="card${i}">
      <div class="row1">
        ${scoreBadge}
        <div class="subj" onclick="openThread('${e.entry_id}')">${esc(e.subject||"(no subject)")}</div>
        <div class="date">${esc(conversationDate(e))}</div>
      </div>
      <div class="convMeta"><span>${esc(conversationFrom(e))}</span><span>${esc(meta)}</span><span>${esc((e.participants||[]).slice(0,4).join("; "))}</span></div>
      <div class="insight">${esc(conversationSnippet(e))}</div>
      ${follow.hint && follow.state!=="none" ? `<div class="suggest">${esc(follow.hint)}</div>` : `<div class="suggest">${esc(e.suggested_action||"")}</div>`}
      ${questionHtml}
      <div class="chips">${followChip(follow)}${unreadChip}${attChip}${themes}${reasons}${labels}</div>
      <div class="actions">
        <button onclick="openThread('${e.entry_id}')">Open conversation</button>
        <button onclick="replyTo('${e.entry_id}', false)">Reply</button>
        <button onclick="act('archive','${e.entry_id}',${i})">Archive latest</button>
        <button onclick="markDone('${e.entry_id}',${i})">Done</button>
        <button class="danger" onclick="act('trash','${e.entry_id}',${i})">Trash latest</button>
      </div>
    </div>`;
  }).join("");
}

function removeCard(i){
  ITEMS.splice(i,1);
  if(SEL>=ITEMS.length) SEL = Math.max(0, ITEMS.length-1);
  renderList();
}

async function act(kind, entry_id, i){
  const path = kind==="archive" ? "/api/archive" : "/api/trash";
  const d = await post(path, {entry_id});
  if(d.success){ toast((kind==="archive"?"Archived":"Moved to trash")+": "+(d.subject||""), "ok"); removeCard(i); loadUnread(); }
  else toast(d.message||"Failed", "err");
}
async function markDone(entry_id, i){
  const d = await post("/api/mark", {entry_id, read:true});
  if(d.success){ toast("Marked read", "ok"); removeCard(i); loadUnread(); }
  else toast(d.message||"Failed","err");
}

async function openThread(entry_id){
  const ov = document.getElementById("readerOverlay");
  const m = document.getElementById("readerModal");
  const current = ITEMS.find(x=>x.entry_id===entry_id) || {};
  m.innerHTML = '<div class="empty"><span class="spinner"></span> loading conversation...</div>';
  ov.classList.add("open");
  // mark the latest anchor message read in background
  post("/api/mark", {entry_id, read:true}).then(loadUnread);
  const d = await get(`/api/thread?entry_id=${encodeURIComponent(entry_id)}&days=${currentDays()}`);
  if(!d.success){ m.innerHTML = `<div class="empty">Warning: ${esc(d.message||"error")}</div>`; return; }
  const follow = current.follow_up || {};
  const questions = (current.open_questions||[]).map(q=>
    `<div class="question"><b>${esc(q.from||"Question")}</b>: ${esc(q.question||"")}</div>`
  ).join("");
  const insight = (current.insight_summary || current.suggested_action || follow.hint) ? `
    <div class="suggest">
      <b>${esc(current.suggested_action||follow.label||"Insight")}</b><br>
      ${esc(follow.hint || current.insight_summary || "")}
    </div>
    ${questions}` : "";
  const msgs = (d.messages||[]).map(x=>`
    <div class="msg">
      <div class="h"><b>${esc(x.from||"")}</b><span class="grow"></span>${esc(x.date||"")}${x.has_attachments?" attachment":""}</div>
      <div class="body">${esc(x.snippet||"")}</div>
    </div>`).join("");
  m.innerHTML = `
    <h2>${esc(d.subject||current.subject||"(no subject)")}</h2>
    <div class="meta">${(d.participants||current.participants||[]).map(esc).join(" | ")} - ${d.message_count} message(s)</div>
    ${insight}
    ${msgs || '<div class="muted">No messages found in this window.</div>'}
    <div class="modal-actions">
      <button onclick="replyTo('${entry_id}', false); closeModal('readerOverlay')">Reply</button>
      <button onclick="replyTo('${entry_id}', true); closeModal('readerOverlay')">Reply all</button>
      <button onclick="forwardTo('${entry_id}'); closeModal('readerOverlay')">Forward</button>
      <button onclick="closeModal('readerOverlay')">Close</button>
    </div>`;
}

function closeModal(id){ document.getElementById(id).classList.remove("open"); }

/* ---- compose / reply / forward ---- */
function showCompose(opts){
  COMPOSE = opts;
  document.getElementById("composeTitle").textContent = opts.title;
  document.getElementById("composeMeta").textContent = opts.meta||"";
  document.getElementById("toField").style.display = opts.hideTo ? "none":"block";
  document.getElementById("subjField").style.display = opts.hideSubj ? "none":"block";
  document.getElementById("ccField").style.display = opts.mode==="new" ? "block":"none";
  document.getElementById("bodyLabel").textContent = opts.bodyLabel||"Message";
  document.getElementById("cTo").value = opts.to||"";
  document.getElementById("cCc").value = "";
  document.getElementById("cSubj").value = opts.subject||"";
  document.getElementById("cBody").value = opts.body||"";
  document.getElementById("composeOverlay").classList.add("open");
  setTimeout(()=>document.getElementById(opts.mode==="new"?"cTo":"cBody").focus(),50);
}
function newEmail(){ showCompose({mode:"new", title:"New email"}); }
function replyTo(entry_id, all){
  showCompose({mode:"reply", entry_id, reply_all:all, hideTo:true, hideSubj:true,
    title: all?"Reply all":"Reply", meta:"A draft reply will be created (thread quoted).",
    bodyLabel:"Your reply"});
}
function forwardTo(entry_id){
  showCompose({mode:"forward", entry_id, hideSubj:true,
    title:"Forward", meta:"Original message & attachments are preserved.",
    bodyLabel:"Note (optional)"});
}

async function saveDraft(){
  const r = await createDraftFromCompose();
  if(r && r.success){ toast("Draft saved ✓", "ok"); closeModal("composeOverlay"); if(VIEW==="drafts") loadDrafts(); }
  else if(r) toast(r.message + (r.details?(" — "+r.details):""), "err");
}

async function createDraftFromCompose(){
  const to = document.getElementById("cTo").value.trim();
  const cc = document.getElementById("cCc").value.trim();
  const subject = document.getElementById("cSubj").value.trim();
  const body = document.getElementById("cBody").value;
  if(COMPOSE.mode==="new")
    return post("/api/draft", {to, cc, subject, body});
  if(COMPOSE.mode==="reply")
    return post("/api/reply", {entry_id:COMPOSE.entry_id, reply_text:body, reply_all:COMPOSE.reply_all});
  if(COMPOSE.mode==="forward")
    return post("/api/forward", {entry_id:COMPOSE.entry_id, to, comment:body});
}

async function sendCompose(){
  // For a NEW email we can send directly with confirm; for reply/forward we
  // create the draft first, then send that draft.
  if(COMPOSE.mode==="new"){
    const to = document.getElementById("cTo").value.trim();
    const cc = document.getElementById("cCc").value.trim();
    const subject = document.getElementById("cSubj").value.trim();
    const body = document.getElementById("cBody").value;
    if(!confirm(`Send this email to:\n${to}\n\nSubject: ${subject}`)) return;
    const d = await post("/api/send_email", {to, cc, subject, body, confirm:true});
    afterSend(d);
    return;
  }
  const r = await createDraftFromCompose();
  if(!r || !r.success){ toast((r&&r.message)||"Could not prepare draft","err"); return; }
  if(!confirm("Send this message now?")) { toast("Saved as draft instead.","ok"); closeModal("composeOverlay"); return; }
  const d = await post("/api/send_draft", {draft_id:r.draft_id, confirm:true});
  afterSend(d);
}
function afterSend(d){
  if(d.success){ toast("Sent ✓","ok"); closeModal("composeOverlay"); refresh(); loadUnread(); }
  else toast(d.message + (d.details?(" — "+d.details):""), "err");
}
async function sendExistingDraft(draft_id){
  const prev = await post("/api/send_draft", {draft_id, confirm:false});
  const who = prev.preview ? (prev.preview.to||[]).join(", ") : "";
  if(!confirm(`Send this draft${who?(" to "+who):""}?`)) return;
  const d = await post("/api/send_draft", {draft_id, confirm:true});
  if(d.success){ toast("Sent ✓","ok"); loadDrafts(); } else toast(d.message||"Failed","err");
}

/* ---- keyboard shortcuts ---- */
document.addEventListener("keydown", (e)=>{
  if(["INPUT","TEXTAREA","SELECT"].includes(document.activeElement.tagName)){
    if(e.key==="Enter" && document.activeElement.id==="searchBox"){ switchView("search"); }
    return;
  }
  if(document.querySelector(".overlay.open")){ if(e.key==="Escape"){ closeModal("readerOverlay"); closeModal("composeOverlay"); } return; }
  const cur = ITEMS[SEL];
  switch(e.key){
    case "j": SEL=Math.min(ITEMS.length-1,SEL+1); renderList(); scrollSel(); break;
    case "k": SEL=Math.max(0,SEL-1); renderList(); scrollSel(); break;
    case "o": case "Enter": if(cur) openThread(cur.entry_id); break;
    case "r": if(cur) replyTo(cur.entry_id,false); break;
    case "e": if(cur) act("archive",cur.entry_id,SEL); break;
    case "u": if(cur) markDone(cur.entry_id,SEL); break;
    case "#": if(cur) act("trash",cur.entry_id,SEL); break;
    case "g": refresh(); break;
    case "/": e.preventDefault(); document.getElementById("searchBox").focus(); break;
    case "c": newEmail(); break;
  }
});
function scrollSel(){ const el=document.getElementById("card"+SEL); if(el) el.scrollIntoView({block:"nearest"}); }

document.getElementById("searchBox").addEventListener("keydown", e=>{
  if(e.key==="Enter"){ switchView("search"); }
});

/* boot */
(async function(){
  await loadUnread();
  await refresh();
})();
</script>
